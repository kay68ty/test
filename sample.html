<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャゲーム</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #fff;
  }
  h1 {
    margin-top: 20px;
  }
  #result {
    margin: 30px auto;
    padding: 20px;
    width: 250px;
    border-radius: 15px;
    background: rgba(0,0,0,0.3);
    font-size: 20px;
  }
  button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    cursor: pointer;
  }
  button:hover {
    background: #ffaa00;
  }
  .rarity {
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<h1>🎰 ガチャゲーム</h1>
<div id="result">ボタンを押してガチャを引こう！</div>
<button onclick="gacha()">ガチャを引く！</button>

<script>
  const items = [
    {name: "SSRキャラ🔥", rate: 5},
    {name: "SRキャラ✨", rate: 15},
    {name: "Rキャラ⭐", rate: 30},
    {name: "Nキャラ", rate: 50}
  ];

  function gacha() {
    let rand = Math.random() * 100;
    let sum = 0;

    for (let i = 0; i < items.length; i++) {
      sum += items[i].rate;
      if (rand <= sum) {
        showResult(items[i]);
        return;
      }
    }
  }

  function showResult(item) {
    const resultDiv = document.getElementById("result");

    let color = "white";
    if (item.name.includes("SSR")) color = "gold";
    else if (item.name.includes("SR")) color = "violet";
    else if (item.name.includes("R")) color = "skyblue";

    resultDiv.innerHTML = `\n      <div style="color:${color}; font-size:24px;">${item.name}</div>\n      <div class="rarity">排出！</div>\n    `;
  }
</script>

</body>
</html>
